services:
  db:
    image: postgres:16-alpine
    container_name: scryve-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scryve}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scryve}
      POSTGRES_DB: ${POSTGRES_DB:-scryve}
    ports:
      - "5432:5432"
    volumes:
      - scryve_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scryve} -d ${POSTGRES_DB:-scryve}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scryve-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  scryve_pg_data:
