# Behavioral signal thresholds used to derive an availability multiplier
# downstream. Candidates below these thresholds get penalized, not removed.
behavioral_thresholds:
  min_recruiter_response_rate: 0.20
  max_last_active_days: 90
  min_interview_completion_rate: 0.50
  min_profile_completeness: 60
